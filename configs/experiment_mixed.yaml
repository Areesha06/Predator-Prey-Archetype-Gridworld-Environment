experiment:
  algorithm:
    name: mixed
    params:
      predator_algo: cql   # predators use Centralized Q-Learning
      prey_algo: iql        # prey use Independent Q-Learning
      alpha: 0.1
      gamma: 0.99
      epsilon: 1.0
      epsilon_decay: 0.995
      min_epsilon: 0.05
      cql_alpha: 0.1
      action_dim: 5
      episodes: 1000
      seed: 42
