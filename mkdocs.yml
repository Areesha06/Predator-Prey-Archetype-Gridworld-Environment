theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.expand
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          # multi_agent_package/core/ and each baselines/<ALGO>/ subdir have
          # no __init__.py (namespace packages) — griffe can't traverse
          # them as submodules of their parent package. core/ is
          # deliberately kept that way (off-limits per CONTRIBUTING.md's
          # Golden Rule, so adding __init__.py there isn't an option);
          # the baselines/ subdirs are just an existing gap. Rather than
          # touch source for a docs config, each is listed here as its
          # own search root instead, referenced with a bare module name
          # in docs/api/*.md (e.g. `agent.Agent`, `iql.IQL`).
          paths:
            - src
            - src/multi_agent_package/core
            - src/baselines
            - src/baselines/IQL
            - src/baselines/CQL
            - src/baselines/MIXED
            - src/baselines/DQN
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            heading_level: 2
            members_order: source
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - admonition
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
