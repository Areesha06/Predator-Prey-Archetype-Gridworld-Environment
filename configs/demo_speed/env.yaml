env:
  name: gridworld
  size: 10                   # 10x10 grid
  obstacle_percentage: 10.0    # same obstacle density as the main config
  seed: 42
  render_mode: null            # set to "human" when running interactively
  window_size: 600

  dynamics:
    allow_cell_sharing: true
    block_agents_by_obstacles: true

  termination:
    capture_threshold: 1       # episode ends on first capture
    max_steps: 500
